#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.5
    with:
      duckdb_version: v1.5.5
      ci_tools_version: v1.5.5
      extension_name: jsono
      # All: linux_amd64;linux_arm64;linux_amd64_musl;osx_amd64;osx_arm64;windows_amd64;windows_amd64_mingw;wasm_eh;wasm_mvp;wasm_threads
      # linux_arm64 and osx_arm64 are "larger runners" (billed per-minute, never
      # covered by free minutes); their billing was configured 2026-07-02, so all
      # three of linux_amd64, linux_arm64, and osx_arm64 build. exclude_archs drops
      # only the musl, Windows, wasm, and osx_amd64 targets.
      exclude_archs: 'linux_amd64_musl;osx_amd64;windows_amd64;windows_amd64_mingw;wasm_eh;wasm_mvp;wasm_threads'

  code-quality-check:
    name: Code Quality Check
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_code_quality.yml@v1.5.5
    with:
      duckdb_version: v1.5.5
      ci_tools_version: v1.5.5
      extension_name: jsono
      format_checks: 'format;tidy'
