#
# Builds the extension with AddressSanitizer + UndefinedBehaviorSanitizer (both
# default-on for a clang Debug build of DuckDB) and runs the SQLLogic suite plus
# the hypothesis property/fuzz harness against that instrumented build. This is
# the binary-format safety net: the JSONO reader walks raw BLOB offsets, so an
# off-by-one there is invisible in a release build but trapped here.
#
name: Sanitizer

on:
  push:
    branches: [main]
  pull_request:
  # Weekly deep fuzz pass: every push/PR runs a small example budget for fast
  # feedback, so the thorough sweep lives on a schedule. Monday 04:00 UTC.
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # event_name is in the key so a routine push to main never cancels the
  # in-flight weekly `schedule` deep run (both resolve to refs/heads/main).
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  sanitizer:
    name: ASan + UBSan (linux_amd64)
    runs-on: ubuntu-latest
    env:
      # Standalone clang build: no vcpkg, no Docker, no external libraries
      # (jsono vendors yyjson + string-view-lite; parquet uses bundled mbedtls).
      GEN: ninja
      CC: clang
      CXX: clang++
      # Leak detection is noisy against the DuckDB runtime; this job targets
      # memory-safety and UB, not leaks.
      ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq ninja-build clang

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      # Cache compiled objects across runs. DuckDB core is the bulk of the
      # ~15-minute debug build and rarely changes between pushes; only the
      # jsono sources recompile, so warm-cache rebuilds are dominated by the
      # link step. The sanitizer compile flags are part of the ccache hash, so
      # this cache never collides with the release pipeline's ccache.
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: sanitizer-asan-ubsan
          max-size: 1G

      - name: Build (Debug = ASan + UBSan)
        env:
          EXT_FLAGS: -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        run: make debug

      - name: SQLLogic tests under sanitizers
        run: make test_debug

      # Example budget is tiered: push/PR runs a fast ~100-example sweep (~7 min)
      # for quick feedback; the weekly `schedule` run cranks it up for a deep
      # fuzz pass. Cost is linear in the example count.
      - name: Property + fuzz harness under sanitizers
        env:
          JSONO_DUCKDB_BIN: build/debug/duckdb
          JSONO_EXTENSION: build/debug/extension/jsono/jsono.duckdb_extension
          JSONO_PROPERTY_MAX_EXAMPLES: ${{ github.event_name == 'schedule' && '2000' || '100' }}
        run: uv run --frozen test/property/jsono_property.py

      - name: Row-group pruning guard under sanitizers
        env:
          JSONO_DUCKDB_BIN: build/debug/duckdb
          JSONO_EXTENSION: build/debug/extension/jsono/jsono.duckdb_extension
        run: uv run --frozen test/pruning/jsono_pruning.py

  # Release-build fuzz leg. The property/fuzz harness is env-pointable at any build, so this runs the
  # same corrupt-blob sweep against an -O2 optimizer-enabled build: release codegen inlines and
  # reorders the reader's bound checks differently than the sanitizer Debug build, and if that single
  # job is ever disabled this keeps a fuzz pass alive. The SQLLogic suite is intentionally NOT re-run
  # here (the distribution pipeline owns it); this leg is only the property harness + pruning guard.
  release-fuzz:
    name: Release fuzz (linux_amd64)
    runs-on: ubuntu-latest
    env:
      # Plain release build: default toolchain (gcc), no sanitizer flags.
      GEN: ninja

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq ninja-build

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      # Distinct ccache key: release objects never collide with the sanitizer job's instrumented
      # objects (different compile flags), so the two caches stay independent.
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: release-fuzz
          max-size: 1G

      - name: Build (Release)
        env:
          EXT_FLAGS: -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        run: make release

      # Example budget tiered exactly like the sanitizer job: push/PR runs a fast sweep, the weekly
      # `schedule` run cranks it up for a deep pass. Cost is linear in the example count.
      - name: Property + fuzz harness (release)
        env:
          JSONO_DUCKDB_BIN: build/release/duckdb
          JSONO_EXTENSION: build/release/extension/jsono/jsono.duckdb_extension
          JSONO_PROPERTY_MAX_EXAMPLES: ${{ github.event_name == 'schedule' && '2000' || '100' }}
        run: uv run --frozen test/property/jsono_property.py

      - name: Row-group pruning guard (release)
        env:
          JSONO_DUCKDB_BIN: build/release/duckdb
          JSONO_EXTENSION: build/release/extension/jsono/jsono.duckdb_extension
        run: uv run --frozen test/pruning/jsono_pruning.py

  # UBSan-only companion: ASan's fat stack frames force the nesting-depth limit down to 32, so
  # depths 33-1000 of every recursive walker never run under the ASan job. A UBSan-only build on
  # Linux keeps the full 1000-depth limit (worker threads get the platform-default 8 MiB stack;
  # macOS's ~512 KiB worker stacks cannot fit the instrumented recursion, so the gate drops that
  # combination to 32) — this job is the one place the deep recursion levels execute
  # instrumented: jsono_depth_stress.test runs at depth 999 here.
  ubsan-full-depth:
    name: UBSan full-depth (linux_amd64)
    runs-on: ubuntu-latest
    env:
      GEN: ninja
      CC: clang
      CXX: clang++
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq ninja-build clang

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: sanitizer-ubsan-only
          max-size: 1G

      - name: Build (Debug = UBSan only, full depth limit)
        env:
          EXT_FLAGS: -DENABLE_SANITIZER=FALSE -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        run: make debug

      - name: SQLLogic tests under UBSan at full depth
        run: make test_debug
